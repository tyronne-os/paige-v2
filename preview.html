<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PAIGE Live Preview</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; }
.bar {
  height: 36px;
  background: #111;
  border-bottom: 1px solid rgba(255,215,0,0.1);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  flex-shrink: 0;
}
.bar a {
  color: rgba(255,215,0,0.6);
  font-size: 11px;
  text-decoration: none;
  padding: 3px 10px;
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 4px;
}
.bar a:hover { background: rgba(255,215,0,0.1); }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.label { font-size: 12px; color: rgba(255,215,0,0.4); letter-spacing: 1px; }
.url { font-size: 10px; color: rgba(255,255,255,0.2); font-family: monospace; }
iframe { flex: 1; border: none; width: 100%; }
</style>
</head>
<body>
<div class="bar">
  <div class="dot"></div>
  <span class="label">PAIGE LOCAL</span>
  <span class="url">localhost:7860</span>
  <a href="http://localhost:7860" target="_blank">&#8599; Open in browser</a>
  <a href="https://huggingface.co/spaces/AIBRUH/paige-v5" target="_blank">&#128196; HF Repo</a>
</div>
<iframe src="http://localhost:7860" allow="microphone; camera"></iframe>
</body>
</html>
